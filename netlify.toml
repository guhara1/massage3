[build]
  publish = "."
  command = "node generate-seo-area-pages.js && node generate-area-alias-pages.js && node generate-area-commercial-pages.js && node generate-seo-station-pages.js && node verify-area-pages.js"

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "SAMEORIGIN"
    Referrer-Policy = "strict-origin-when-cross-origin"
