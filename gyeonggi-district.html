const slug=location.pathname.split("/").filter(Boolean)[2]||"suwon";
const district=slugToDistrict[slug]||"수원";
const dongs=dongData[district]||[`${district}동`,`${district}1동`,`${district}2동`];
const cleanDong=(dong)=>dong.replace(/\s+/g,"-").toLowerCase().replace(/동$/,"-dong").replace(/읍$/,"-eup").replace(/면$/,"-myeon").replace(/역$/,"-station");
function dongUrl(dong){return `/area/gyeonggi/${districtToSlug[district]||slug}/${cleanDong(dong)}/`;}
document.title=`${district} 출장마사지 가능 지역 | 경기 세부 동 예약 안내`;
document.querySelector('meta[name="description"]').content=`${district} 출장마사지 이용 전 확인하면 좋은 세부 동, 방문 가능 범위, 예약 기준, 가격 차이와 코스 선택 방법을 안내합니다.`;
document.getElementById("page-title").textContent=`${district} 세부 동 선택`;
document.getElementById("page-desc").textContent=`경기 ${district} 안에서 이용할 세부 동을 선택하면 예약 전 확인 기준과 상세 안내 페이지로 이동합니다.`;
document.getElementById("panel-title").textContent=`${district} 세부 동 선택`;
document.getElementById("panel-copy").textContent=`${district} 안에서도 동네별 이동 시간, 주차와 출입 방식, 심야 가능 여부가 달라질 수 있습니다.`;
document.getElementById("dong-grid").innerHTML=dongs.map(dong=>`<a class="area-card" href="${dongUrl(dong)}"><strong>${dong}</strong><span>상세 안내</span></a>`).join("");
document.getElementById("trust-title").textContent=`${district} 출장마사지 예약 전 확인 기준`;
document.getElementById("trust-lead").textContent=`${district}은 경기 안에서도 생활권과 방문 목적이 나뉘는 지역입니다. 세부 동, 희망 시간, 건물 출입 조건을 함께 확인하면 예약 가능 여부와 최종 안내가 더 정확해집니다.`;
document.getElementById("copy-time").textContent=`${district}은 역세권과 주거 단지의 동선이 다를 수 있어 희망 시간만으로 판단하기 어렵습니다. 가까운 역이나 세부 동을 먼저 알려주시면 안내가 빨라집니다.`;
document.getElementById("copy-check").textContent="코스명보다 중요한 것은 방문 가능 시간, 최종 요금, 건물 출입 방식입니다. 세 조건이 명확해야 처음 이용하는 분도 부담을 줄일 수 있습니다.";
document.getElementById("copy-tip").textContent="몸 상태가 좋지 않거나 강한 압이 부담스럽다면 예약 전에 먼저 말하는 편이 좋습니다. 무리한 진행보다 컨디션에 맞춘 코스 선택이 안전합니다.";
const navToggle=document.querySelector(".nav-toggle");const mainNav=document.querySelector("#main-nav");navToggle?.addEventListener("click",()=>{const isOpen=mainNav.classList.toggle("is-open");navToggle.setAttribute("aria-expanded",String(isOpen));});
