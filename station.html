<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>역세권 예약 안내 | 마짱</title>
  <meta name="description" content="주요 지하철역 주변 방문 가능 범위, 예약 기준, 출구별 생활권과 코스 선택 방법을 안내합니다.">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="shortcut icon" href="/favicon.ico">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body { background:#050505; color:#fff; }
    .station-hero { padding:96px 24px 58px; background:radial-gradient(circle at 16% 0%, rgba(255,138,29,.28), transparent 34%), linear-gradient(135deg,#1c1007,#050505 64%); border-bottom:1px solid rgba(255,138,29,.3); }
    .wrap { max-width:1160px; margin:0 auto; }
    .station-hero h1 { color:var(--orange); font-size:clamp(38px,6vw,70px); line-height:1.08; margin:0 0 18px; }
    .station-hero p { color:rgba(255,255,255,.9); font-size:19px; line-height:1.75; max-width:880px; }
    .cta-row { display:flex; flex-wrap:wrap; gap:12px; margin-top:28px; }
    .station-section { padding:44px 24px 72px; }
    .station-grid { display:grid; grid-template-columns:1.05fr .95fr; gap:18px; }
    .station-card { background:linear-gradient(145deg, rgba(31,31,31,.97), rgba(9,9,9,.99)); border:1px solid rgba(255,138,29,.28); border-radius:8px; box-shadow:0 24px 64px rgba(0,0,0,.38); padding:24px; }
    .station-card h2 { color:var(--orange); font-size:clamp(24px,3vw,34px); margin:0 0 14px; }
    .station-card h3 { color:var(--orange); font-size:22px; margin:0 0 12px; }
    .station-card p, .station-card li { color:rgba(255,255,255,.86); font-size:16px; line-height:1.86; }
    .station-card ul { display:grid; gap:8px; margin:0; padding-left:18px; }
    .station-card.wide { grid-column:1 / -1; }
    .link-chips { display:flex; flex-wrap:wrap; gap:10px; margin-top:14px; }
    .link-chips a { border:1px solid rgba(255,138,29,.42); border-radius:999px; color:#fff; font-weight:900; padding:10px 14px; text-decoration:none; }
    .link-chips a:hover { background:rgba(255,138,29,.14); color:var(--orange); }
    .faq details { border-top:1px solid rgba(255,255,255,.12); padding:14px 0; }
    .faq summary { color:#fff; cursor:pointer; font-weight:900; }
    .faq p { margin:10px 0 0; }
    @media (max-width:820px) { .station-grid { grid-template-columns:1fr; } .station-card.wide { grid-column:auto; } .station-hero { padding-top:76px; } }
  </style>
</head>
<body>
  <header class="site-header">
    <a class="brand" href="/" aria-label="마짱 홈"><span class="brand-mark">M</span><span><strong>마짱</strong><small>전국 지역 안내</small></span></a>
    <button class="nav-toggle" type="button" aria-expanded="false" aria-controls="main-nav">메뉴</button>
    <nav id="main-nav" class="main-nav" aria-label="상단 메뉴"><div class="nav-item"><a href="/#regions">지역 출장마사지</a></div><div class="nav-item"><a href="/services.html">서비스 안내</a></div><div class="nav-item"><a href="/guide.html">이용안내</a></div><div class="nav-item"><a href="/reviews.html">후기</a></div><div class="nav-item"><a href="/support.html">고객센터</a></div></nav>
  </header>
  <main>
    <section class="station-hero"><div class="wrap"><p class="eyebrow">Station guide</p><h1 id="station-title">역세권 예약 안내</h1><p id="station-summary"></p><div class="cta-row"><a class="button primary" href="tel:0508-202-4683">0508-202-4683 전화예약</a><a class="button secondary" href="/#regions">지역 선택</a></div></div></section>
    <section class="station-section"><div class="wrap station-grid" id="station-content"></div></section>
  </main>
  <footer class="site-footer"><strong>마짱</strong><p>전국 역세권 지역 정보 안내</p></footer>
  <a class="mobile-call-button" href="tel:0508-202-4683" aria-label="0508-202-4683 전화예약"><span>전화예약</span><strong>0508-202-4683</strong></a>
  <script src="/static-area-links.js"></script>
  <script src="/area-slug-labels.js"></script>
  <script>
    const stations = {
      "gangnam-station": { name:"강남역", city:"서울", district:"강남", nearby:["역삼동","서초동","논현동"], exits:"2호선과 신분당선 환승 수요가 많고, 10번·11번 출구 주변은 오피스와 상권 문의가 집중됩니다.", reason:"강남역 주변은 퇴근 이후와 심야 시간대 문의가 많은 편입니다. 건물 출입 방식과 엘리베이터 이용 가능 여부를 먼저 확인하면 예약 흐름이 깔끔해집니다.", tip:"강남역 근처 오피스텔이나 호텔이면 건물명, 가까운 출구, 희망 시간을 함께 알려주세요." },
      "seolleung-station": { name:"선릉역", city:"서울", district:"강남", nearby:["역삼동","대치동","삼성동"], exits:"2호선과 수인분당선이 만나는 업무지구라 평일 저녁 문의가 꾸준합니다.", reason:"선릉역은 오피스 밀집지와 주거지가 가까워 같은 역세권 안에서도 방문 조건이 달라집니다.", tip:"선릉역 주변은 퇴근 시간대 이동이 밀릴 수 있어 대체 가능 시간을 함께 말하면 좋습니다." },
      "hongik-station": { name:"홍대입구역", city:"서울", district:"마포", nearby:["서교동","연남동","합정동"], exits:"2호선, 공항철도, 경의중앙선 환승역으로 주말 저녁 유동 인구가 많습니다.", reason:"홍대입구역 주변은 숙박, 상권, 주거 문의가 섞여 있어 출구와 건물 형태 확인이 중요합니다.", tip:"주말이나 늦은 시간에는 도로 접근과 주차 조건을 먼저 확인하는 편이 안전합니다." },
      "pangyo-station": { name:"판교역", city:"경기", district:"성남 분당", nearby:["판교동","백현동","삼평동"], exits:"판교테크노밸리와 주거 단지가 가까워 평일 저녁 문의가 많은 역세권입니다.", reason:"판교역은 업무지구와 아파트 단지의 출입 방식이 달라 세부 위치 확인이 필요합니다.", tip:"회사 인근인지 주거 단지인지 먼저 알려주면 가능 시간 안내가 빨라집니다." },
      "bupyeong-station": { name:"부평역", city:"인천", district:"부평", nearby:["부평동","산곡동","부개동"], exits:"1호선과 인천1호선 환승 상권으로 시간대별 이동 흐름이 빠르게 달라집니다.", reason:"부평역은 상권 문의와 주거지 문의가 함께 있어 건물 출입 방식과 방문 시간 확인이 중요합니다.", tip:"상가 건물인지 주거지인지, 가까운 출구를 함께 말하면 안내가 정확해집니다." },
      "seomyeon-station": { name:"서면역", city:"부산", district:"부산진", nearby:["부전동","전포동","범천동"], exits:"부산 1·2호선 환승 중심지로 야간 상권 문의가 많은 역세권입니다.", reason:"서면역 주변은 유동 인구와 차량 흐름의 영향을 받아 도착 가능 시간이 달라질 수 있습니다.", tip:"숙박시설인지 오피스텔인지, 주변 출구와 희망 시간을 함께 확인하세요." }
    };
    const citySlug = { "서울":"seoul", "경기":"gyeonggi", "인천":"incheon", "부산":"busan" };
    function currentSlug() { const parts = location.pathname.split("/").filter(Boolean); return parts[2] || new URLSearchParams(location.search).get("station") || "gangnam-station"; }
    function areaHref(s, dong) { return window.MAZZANG_AREA_SLUGS?.areaUrl?.(s.city, s.district, dong) || "/#regions"; }
    const s = stations[currentSlug()] || stations["gangnam-station"];
    const title = `${s.name} 출장마사지 예약 전 확인 기준 | ${s.nearby.join("·")} 생활권 안내`;
    const description = `${s.name} 출장마사지 이용 전 확인하면 좋은 출구별 생활권, 방문 가능 시간, 건물 출입 방식, 코스 선택 기준을 정리했습니다.`;
    document.title = title;
    document.querySelector('meta[name="description"]').content = description;
    document.querySelector("#station-title").textContent = `${s.name} 예약 전 확인 기준`;
    document.querySelector("#station-summary").textContent = description;
    document.querySelector("#station-content").innerHTML = `
      <article class="station-card"><h2>${s.name} 주변에서 찾는 분들이 많은 이유</h2><p>${s.reason}</p></article>
      <article class="station-card"><h2>${s.name} 출구와 생활권 기준</h2><p>${s.exits}</p><p>${s.tip}</p></article>
      <article class="station-card"><h3>가까운 행정동 연결</h3><p>${s.name} 검색자는 실제로는 가까운 동네 방문 가능 여부를 함께 확인하는 경우가 많습니다.</p><div class="link-chips">${s.nearby.map((dong) => `<a href="${areaHref(s, dong)}">${dong}</a>`).join("")}</div></article>
      <article class="station-card"><h3>예약 전 확인할 기준</h3><ul><li>가까운 출구 또는 건물명</li><li>희망 날짜와 시간, 가능한 대체 시간</li><li>코스 종류와 관리 시간</li><li>주차 가능 여부와 건물 출입 방식</li></ul></article>
      <article class="station-card wide"><h2>${s.name} 출장마사지 자주 묻는 질문</h2><div class="faq"><details open><summary>${s.name} 근처도 당일 예약이 가능한가요?</summary><p>가능 여부는 시간대와 이동 동선에 따라 달라집니다. ${s.name} 가까운 출구, 건물명, 희망 시간을 함께 알려주시면 더 정확하게 안내할 수 있습니다.</p></details><details><summary>역 근처와 주거 단지는 안내가 다른가요?</summary><p>네. 역세권 상권은 이동·주차 조건이 중요하고, 주거 단지는 출입 방식과 조용한 방문 시간이 더 중요할 수 있습니다.</p></details><details><summary>요금은 언제 확정되나요?</summary><p>지역, 코스, 시간, 이동 조건을 확인한 뒤 예약 전 최종 요금을 안내합니다.</p></details></div></article>`;
    const navToggle = document.querySelector(".nav-toggle");
    const mainNav = document.querySelector("#main-nav");
    navToggle?.addEventListener("click", () => { const isOpen = mainNav.classList.toggle("is-open"); navToggle.setAttribute("aria-expanded", String(isOpen)); });
  </script>
</body>
</html>
