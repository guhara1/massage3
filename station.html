    const stationTypes = {
      office: {
        lead:"업무지구형 역세권은 퇴근 직후 문의가 몰리고, 건물 출입 절차가 예약 품질에 직접 영향을 줍니다.",
        faqs:[

          ["오피스 건물은 무엇을 먼저 확인해야 하나요?","출입 등록, 엘리베이터 이용, 야간 출입 가능 여부를 먼저 확인하는 것이 좋습니다. 건물 규정이 있는 경우 방문 방식이 달라질 수 있습니다."],
          ["업무지구 요금이 달라질 수 있나요?","코스 시간, 심야 여부, 이동 거리, 주차 조건에 따라 최종 안내가 달라질 수 있습니다. 예약 전 최종 금액을 확인한 뒤 진행합니다."]
        ]
      },
      transfer: {
        lead:"환승역은 이동 수요가 많아 같은 역 주변이라도 출구 방향에 따라 도착 시간이 크게 달라집니다.",
        faqs:[
          ["환승역 근처는 출구 번호가 꼭 필요한가요?","네. 같은 역이라도 출구가 반대 방향이면 실제 이동 시간이 달라질 수 있습니다. 가까운 출구와 건물명을 함께 알려주시면 안내가 정확해집니다."],
          ["기차나 버스 도착 시간에 맞춰 예약할 수 있나요?","가능 여부를 확인할 수 있습니다. 다만 교통 지연이 생길 수 있으므로 도착 직후보다 약간 여유 있는 시간을 권장합니다."],
          ["역 앞 상권과 주거지는 기준이 다른가요?","상권은 차량 접근과 주차가 중요하고, 주거지는 출입 방식과 조용한 방문 시간이 중요합니다. 상담 시 방문 형태를 함께 확인합니다."]

      nightlife: {
        lead:"야간 상권형 역세권은 늦은 시간 문의가 많아 건물 입구, 주변 혼잡도, 방문 가능 시간을 더 세밀하게 봐야 합니다.",
        faqs:[
          ["늦은 시간에도 상담이 가능한가요?","운영시간 안에서는 상담이 가능합니다. 다만 야간에는 이동 가능 범위와 배정 상황이 달라질 수 있어 희망 시간을 먼저 확인해야 합니다."],
          ["상권 골목 안쪽도 안내가 되나요?","가능 여부는 차량 접근과 건물 출입 방식에 따라 달라집니다. 골목 위치라면 가까운 큰길이나 출구 기준을 함께 말해 주세요."],
          ["주말에는 예약이 더 어려운가요?","주말 저녁과 심야에는 문의가 많아 원하는 시간이 바로 어려울 수 있습니다. 시간 여유를 두고 문의하면 선택지가 넓어집니다."]
        ]
      },
      residential: {
        lead:"주거권 역세권은 단지명, 동 번호, 출입 방식이 중요하며 조용한 방문 기준을 함께 확인하는 편이 좋습니다.",
        faqs:[
          ["아파트 단지는 어떤 정보를 알려야 하나요?","단지명, 동 위치, 방문 가능 출입구, 주차 가능 여부를 알려주시면 됩니다. 경비실 안내가 필요한 경우 미리 확인하는 것이 좋습니다."],
          ["원룸이나 오피스텔도 예약 기준이 다른가요?","건물 출입 방식과 엘리베이터 이용 가능 여부에 따라 안내가 달라질 수 있습니다. 정확한 건물명 확인이 도움이 됩니다."],
          ["조용한 시간대로 받을 수 있나요?","희망 시간대와 방문 조건을 먼저 확인합니다. 주변 환경에 따라 가능한 시간과 코스 안내가 달라질 수 있습니다."]
        ]
      },
      event: {
        lead:"행사·전시형 역세권은 일정에 따라 교통량이 급격히 달라져 예약 전 주변 일정 확인이 필요합니다.",
        faqs:[
          ["행사 있는 날도 예약할 수 있나요?","가능 여부는 확인할 수 있지만 도로 혼잡과 주차 조건에 따라 시간이 달라질 수 있습니다. 행사 종료 직후는 여유 시간을 두는 편이 좋습니다."],
          ["호텔이나 숙박시설 방문도 가능한가요?","장소 규정과 출입 방식 확인이 먼저입니다. 예약자 정보와 방문 가능 기준을 상담 과정에서 확인합니다."],
          ["도착 시간이 늦어질 수도 있나요?","대형 행사나 공연일에는 주변 차량 흐름이 달라질 수 있습니다. 상담 시 해당 시간대 상황을 반영해 안내합니다."]
        ]
      },
      tourism: {
        lead:"관광권 역세권은 숙박시설, 해변·상권 동선, 계절별 혼잡도가 예약 기준에 영향을 줍니다.",
        faqs:[
          ["숙소 근처에서 문의할 때 무엇을 말해야 하나요?","숙소명, 가까운 역 또는 해변 방향, 희망 시간을 알려주시면 됩니다. 숙소 규정에 따라 방문 방식이 달라질 수 있습니다."],
          ["성수기에는 요금이나 시간이 달라지나요?","성수기와 주말에는 이동 시간과 배정 상황이 달라질 수 있습니다. 최종 요금은 예약 전 확인 후 안내합니다."],
          ["관광 일정 후 바로 이용할 수 있나요?","가능 여부를 확인할 수 있습니다. 이동 피로가 크다면 너무 늦은 시간보다 여유 있는 시간대를 권장합니다."]
        ]
      },
      downtown: {
        lead:"도심 상권형 역세권은 업무, 쇼핑, 숙박 수요가 섞여 있어 방문 장소의 성격을 먼저 확인해야 합니다.",
        faqs:[
          ["도심 상권은 예약 전 무엇이 중요한가요?","건물명, 가까운 출구, 차량 접근 가능 여부가 중요합니다. 복합 건물은 출입 동선이 다를 수 있습니다."],
          ["평일과 주말 안내가 다른가요?","네. 평일은 업무지구 흐름, 주말은 상권 혼잡이 영향을 줍니다. 희망 시간 기준으로 가능 여부를 확인합니다."],
          ["처음 문의할 때 길게 설명해야 하나요?","지역, 역 이름, 방문 장소 형태, 희망 시간, 코스만 알려주셔도 기본 확인이 가능합니다."]
        ]
      },
      terminal: {
        lead:"터미널 인근은 버스·철도 도착 시간과 상권 혼잡도가 겹쳐 예약 시간을 여유 있게 잡는 편이 좋습니다.",
        faqs:[
          ["터미널 도착 후 바로 예약할 수 있나요?","가능 여부는 확인할 수 있습니다. 다만 이동 지연과 수하물 정리 시간을 고려해 약간 여유 있는 시간이 좋습니다."],
          ["터미널 주변 숙박시설은 어떻게 안내하나요?","숙소명과 체크인 가능 시간, 방문 가능 기준을 함께 확인합니다. 시설 규정이 있으면 그 기준을 우선합니다."],
          ["주말 터미널 주변은 시간이 달라지나요?","주말과 연휴에는 도로 혼잡이 커질 수 있어 예약 가능 시간이 평소와 다를 수 있습니다."]
        ]
      },
      airport: {
        lead:"공항 연결 역세권은 항공 일정과 공항철도 이동 시간을 함께 고려해야 예약 흐름이 안정적입니다.",
        faqs:[
          ["비행 전후로 예약할 때 주의할 점은 무엇인가요?","항공 지연 가능성을 고려해 여유 시간을 두는 것이 좋습니다. 도착 직후보다 이동 후 안정적인 시간대를 권장합니다."],
          ["공항 인근 숙소도 안내 가능한가요?","숙소 규정과 위치 확인 후 가능 여부를 안내합니다. 숙소명과 가까운 교통 기준을 함께 알려주세요."],
          ["짐이 많아도 상담 기준이 달라지나요?","서비스 자체보다 이동 동선과 도착 시간이 중요합니다. 일정이 촉박하면 예약 가능 범위가 줄어들 수 있습니다."]
        ]
      },
      youth: {
        lead:"대학가·원룸형 역세권은 골목 위치와 건물 출입 방식이 다양해 세부 주소 확인이 중요합니다.",
        faqs:[
          ["원룸 밀집 지역도 예약 안내가 가능한가요?","가능 여부를 확인할 수 있습니다. 건물명, 호수 전달 방식, 가까운 큰길 기준을 함께 알려주시면 좋습니다."],
          ["늦은 시간 문의가 많은 편인가요?","대학가 주변은 저녁 이후 문의가 생기는 편입니다. 다만 배정 상황에 따라 가능 시간이 달라질 수 있습니다."],
          ["처음 이용하면 어떤 코스가 무난한가요?","처음이라면 너무 긴 코스보다 기본 시간부터 상담받는 편이 부담이 적습니다. 몸 상태와 희망 강도를 함께 말해 주세요."]
        ]
      }
    };
    function currentSlug(){const parts=location.pathname.split("/").filter(Boolean);return parts[2]||new URLSearchParams(location.search).get("station")||"gangnam-station"}
    function findStation(){const list=window.MAZZANG_STATIONS||[];return list.find((item)=>item.slug===currentSlug())||list[0]}
    function areaHref(s,dong){return window.MAZZANG_AREA_SLUGS?.areaUrl?.(s.city,s.district,dong)||`/area/${s.citySlug}/`}
    function stationHref(s){return `/station/${s.citySlug}/${s.slug}/`}
    function renderFaq(s){const cfg=stationTypes[s.type]||stationTypes.downtown;return cfg.faqs.map((item,index)=>`<details ${index===0?"open":""}><summary>${s.name} ${item[0]}</summary><p>${item[1]}</p></details>`).join("")}
    function nearbyStations(s){return (window.MAZZANG_STATIONS||[]).filter((item)=>item.slug!==s.slug&&(item.region===s.region||item.city===s.city)).slice(0,6)}
    const s=findStation();
    const cfg=stationTypes[s.type]||stationTypes.downtown;
    const title=`${s.name} 출장마사지 예약 전 확인사항 | ${s.city} ${s.district} 역세권 안내`;
    const description=`${s.name} 출장마사지 이용 전 확인하면 좋은 예약 기준, 방문 가능 범위, 출구별 생활권, 코스 선택 방법을 정리했습니다. ${s.nearby.join("·")} 주변 이용 전 참고하세요.`;
    document.title=title;
    document.querySelector('meta[name="description"]').content=description;
    document.querySelector("#station-title").textContent=`${s.name} 예약 전 확인 기준`;
    document.querySelector("#station-summary").textContent=description;
    const related=nearbyStations(s);
    document.querySelector("#station-content").innerHTML=`
      <article class="station-card"><h2>${s.name} 주변에서 찾는 분들이 많은 이유</h2><p>${s.profile}</p><p>${cfg.lead}</p><p>${s.tip}</p></article>
      <article class="station-card"><h2>${s.name} 기본 확인 정보</h2><div class="fact-list"><div class="fact-row"><span>권역</span><strong>${s.city} ${s.district}</strong></div><div class="fact-row"><span>노선</span><strong>${s.line}</strong></div><div class="fact-row"><span>상담 기준</span><strong>지역·시간·코스 확인 후 안내</strong></div><div class="fact-row"><span>예약번호</span><strong>0508-202-4683</strong></div></div></article>
      <article class="station-card"><h3>${s.name} 가까운 생활권</h3><p>${s.name}을 검색하는 고객은 실제로 주변 행정동 방문 가능 여부를 함께 확인하는 경우가 많습니다. 아래 생활권은 예약 전 동선 확인에 도움이 됩니다.</p><div class="link-chips">${s.nearby.map((dong)=>`<a href="${areaHref(s,dong)}">${dong}</a>`).join("")}</div></article>
      <article class="station-card"><h3>예약 전 체크할 부분</h3><ul><li>가까운 출구 또는 건물명</li><li>희망 날짜와 시간, 가능한 대체 시간</li><li>원하는 코스와 관리 시간</li><li>주차 가능 여부와 건물 출입 방식</li></ul></article>
      <article class="station-card wide"><h2>${s.name} 출장마사지 자주 묻는 질문</h2><div class="faq">${renderFaq(s)}</div></article>
      <article class="station-card wide"><h2>함께 확인하면 좋은 주변 역세권</h2><p>${s.region} 권역에서 함께 비교하기 좋은 역세권입니다. 같은 도시라도 역 성격에 따라 예약 기준과 이동 시간이 달라질 수 있습니다.</p><div class="nearby-stations">${related.map((item)=>`<a href="${stationHref(item)}"><strong>${item.name}</strong><br><span>${item.city} ${item.district}</span></a>`).join("")}</div></article>`;
    const navToggle=document.querySelector(".nav-toggle");const mainNav=document.querySelector("#main-nav");navToggle?.addEventListener("click",()=>{const isOpen=mainNav.classList.toggle("is-open");navToggle.setAttribute("aria-expanded",String(isOpen))});
  </script>
</body>
</html>
